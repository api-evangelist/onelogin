aid: onelogin
name: OneLogin
description: >-
  OneLogin is an identity and access management platform providing single
  sign-on (SSO), multi-factor authentication, user provisioning, and a
  RESTful API for managing users, roles, applications, MFA, branding,
  connectors, reports, SAML assertions, smart hooks, and Vigilance AI.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Identity
  - Access Management
  - Single Sign-On
  - Multi-Factor Authentication
  - SAML
  - OAuth
created: '2025-01-08'
modified: '2026-04-28'
