  https://raw.githubusercontent.com/api-evangelist/onelogin/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: onelogin:onelogin
    name: OneLogin API
    description: >-
      OneLogin REST API for identity and access management. The API follows
      RESTful principles, is secured by OAuth 2.0, and provides JSON messages
      with search, pagination, sorting, and filtering. Resources include
      Users, Roles, Apps, App Rules, Branding, Connectors, MFA, Reports,
      SAML Assertions, Smart Hooks, Smart MFA, User Mappings, Self-
      Registration, and Vigilance AI.
    humanURL: https://developers.onelogin.com/api-docs/2/getting-started/dev-overview
    baseURL: https://<subdomain>.onelogin.com
