naftiko: 1.0.0-alpha2
info:
  label: OneLogin API — Apps
  description: 'OneLogin API — Apps. 5 operations. Lead operation: List apps. Self-contained Naftiko capability covering one
    Onelogin business surface.'
  tags:
  - Onelogin
  - Apps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ONELOGIN_API_KEY: ONELOGIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: onelogin-apps
    baseUri: https://{subdomain}.onelogin.com
    description: OneLogin API — Apps business capability. Self-contained, no shared references.
    resources:
    - name: api-2-apps
      path: /api/2/apps
      operations:
      - name: listapps
        method: GET
        description: List apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createapp
        method: POST
        description: Create app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-2-apps-id
      path: /api/2/apps/{id}
      operations:
      - name: getapp
        method: GET
        description: Get app by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapp
        method: PUT
        description: Update app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteapp
        method: DELETE
        description: Delete app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ONELOGIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: onelogin-apps-rest
    port: 8080
    description: REST adapter for OneLogin API — Apps. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/2/apps
      name: api-2-apps
      description: REST surface for api-2-apps.
      operations:
      - method: GET
        name: listapps
        description: List apps
        call: onelogin-apps.listapps
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapp
        description: Create app
        call: onelogin-apps.createapp
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/2/apps/{id}
      name: api-2-apps-id
      description: REST surface for api-2-apps-id.
      operations:
      - method: GET
        name: getapp
        description: Get app by ID
        call: onelogin-apps.getapp
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateapp
        description: Update app
        call: onelogin-apps.updateapp
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapp
        description: Delete app
        call: onelogin-apps.deleteapp
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: onelogin-apps-mcp
    port: 9090
    transport: http
    description: MCP adapter for OneLogin API — Apps. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-apps
      description: List apps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: onelogin-apps.listapps
      outputParameters:
      - type: object
        mapping: $.
    - name: create-app
      description: Create app
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: onelogin-apps.createapp
      outputParameters:
      - type: object
        mapping: $.
    - name: get-app-id
      description: Get app by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: onelogin-apps.getapp
      outputParameters:
      - type: object
        mapping: $.
    - name: update-app
      description: Update app
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: onelogin-apps.updateapp
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-app
      description: Delete app
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: onelogin-apps.deleteapp
      outputParameters:
      - type: object
        mapping: $.
