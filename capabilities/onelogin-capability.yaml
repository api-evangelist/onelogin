naftiko: 1.0.0-alpha2
info:
  label: OneLogin API
  description: OneLogin REST API for identity and access management. Provides programmatic access to users, roles, apps, MFA,
    branding, connectors, reports, SAML assertions, smart hooks, and Vigilance AI. Authentication is handled via OAuth 2.0
    bearer tokens.
  tags:
  - Onelogin
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
