naftiko: 1.0.0-alpha2
info:
  label: OneLogin API — Roles
  description: 'OneLogin API — Roles. 6 operations. Lead operation: Get roles. Self-contained Naftiko capability covering
    one Onelogin business surface.'
  tags:
  - Onelogin
  - Roles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ONELOGIN_API_KEY: ONELOGIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: onelogin-roles
    baseUri: https://{subdomain}.onelogin.com
    description: OneLogin API — Roles business capability. Self-contained, no shared references.
    resources:
    - name: api-1-roles
      path: /api/1/roles
      operations:
      - name: getroles
        method: GET
        description: Get roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-2-roles
      path: /api/2/roles
      operations:
      - name: listrolesv2
        method: GET
        description: List roles (v2)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createrole
        method: POST
        description: Create role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-2-roles-id
      path: /api/2/roles/{id}
      operations:
      - name: getrole
        method: GET
        description: Get role by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updaterole
        method: PUT
        description: Update role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleterole
        method: DELETE
        description: Delete role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ONELOGIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: onelogin-roles-rest
    port: 8080
    description: REST adapter for OneLogin API — Roles. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/1/roles
      name: api-1-roles
      description: REST surface for api-1-roles.
      operations:
      - method: GET
        name: getroles
        description: Get roles
        call: onelogin-roles.getroles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/2/roles
      name: api-2-roles
      description: REST surface for api-2-roles.
      operations:
      - method: GET
        name: listrolesv2
        description: List roles (v2)
        call: onelogin-roles.listrolesv2
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createrole
        description: Create role
        call: onelogin-roles.createrole
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/2/roles/{id}
      name: api-2-roles-id
      description: REST surface for api-2-roles-id.
      operations:
      - method: GET
        name: getrole
        description: Get role by ID
        call: onelogin-roles.getrole
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updaterole
        description: Update role
        call: onelogin-roles.updaterole
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleterole
        description: Delete role
        call: onelogin-roles.deleterole
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: onelogin-roles-mcp
    port: 9090
    transport: http
    description: MCP adapter for OneLogin API — Roles. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-roles
      description: Get roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: onelogin-roles.getroles
      outputParameters:
      - type: object
        mapping: $.
    - name: list-roles-v2
      description: List roles (v2)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: onelogin-roles.listrolesv2
      outputParameters:
      - type: object
        mapping: $.
    - name: create-role
      description: Create role
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: onelogin-roles.createrole
      outputParameters:
      - type: object
        mapping: $.
    - name: get-role-id
      description: Get role by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: onelogin-roles.getrole
      outputParameters:
      - type: object
        mapping: $.
    - name: update-role
      description: Update role
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: onelogin-roles.updaterole
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-role
      description: Delete role
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: onelogin-roles.deleterole
      outputParameters:
      - type: object
        mapping: $.
