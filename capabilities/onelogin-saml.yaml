naftiko: 1.0.0-alpha2
info:
  label: OneLogin API — SAML
  description: 'OneLogin API — SAML. 2 operations. Lead operation: Generate SAML assertion. Self-contained Naftiko capability
    covering one Onelogin business surface.'
  tags:
  - Onelogin
  - SAML
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ONELOGIN_API_KEY: ONELOGIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: onelogin-saml
    baseUri: https://{subdomain}.onelogin.com
    description: OneLogin API — SAML business capability. Self-contained, no shared references.
    resources:
    - name: api-1-saml_assertion
      path: /api/1/saml_assertion
      operations:
      - name: generatesamlassertion
        method: POST
        description: Generate SAML assertion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-1-saml_assertion-verify_factor
      path: /api/1/saml_assertion/verify_factor
      operations:
      - name: verifysamlfactor
        method: POST
        description: Verify factor for SAML
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ONELOGIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: onelogin-saml-rest
    port: 8080
    description: REST adapter for OneLogin API — SAML. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/1/saml-assertion
      name: api-1-saml-assertion
      description: REST surface for api-1-saml_assertion.
      operations:
      - method: POST
        name: generatesamlassertion
        description: Generate SAML assertion
        call: onelogin-saml.generatesamlassertion
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/1/saml-assertion/verify-factor
      name: api-1-saml-assertion-verify-factor
      description: REST surface for api-1-saml_assertion-verify_factor.
      operations:
      - method: POST
        name: verifysamlfactor
        description: Verify factor for SAML
        call: onelogin-saml.verifysamlfactor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: onelogin-saml-mcp
    port: 9090
    transport: http
    description: MCP adapter for OneLogin API — SAML. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: generate-saml-assertion
      description: Generate SAML assertion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: onelogin-saml.generatesamlassertion
      outputParameters:
      - type: object
        mapping: $.
    - name: verify-factor-saml
      description: Verify factor for SAML
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: onelogin-saml.verifysamlfactor
      outputParameters:
      - type: object
        mapping: $.
